apiVersion: apps/v1
kind: ReplicaSet
metadata: 
  name: firstreplica
spec:
  replicas: 3 
  selector:
    matchLabels:
      app: nginxtemp
  template:
    metadata:
      name: mynginx
      labels:
        app: nginxtemp
    spec:
      containers:
      - name: nginxcon
        image: nginx:1.20
        ports: 
        - containerPort: 80
