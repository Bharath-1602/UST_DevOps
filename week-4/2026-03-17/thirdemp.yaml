apiVersion: v1
kind: Pod
metadata:
  name: emp-demo3
spec:
  containers:
  - name: con1
    image: nginx
    volumeMounts:
    - name: shared-data
      mountPath: /usr/share/nginx/html

  - name: con2
    image: busybox
    command: ["/bin/sh", "-c"]
    args: ["while true; do date >> /data/index.html; sleep 5; done"]
    volumeMounts:
    - name: shared-data
      mountPath: /data

  volumes:
  - name: shared-data
    emptyDir: {}

   
