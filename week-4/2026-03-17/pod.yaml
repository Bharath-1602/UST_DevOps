apiVersion: v1
kind: Pod
metadata:
  name: vol-pod
  namespace: vls
spec:
  containers:
  - name: app
    image: busybox
    command: ["/bin/sh", "-c", "while true; do echo Hello UST >> /data/test.txt; sleep 5; done"]
    volumeMounts:
    - mountPath: /data
      name: storage
  volumes:
  - name: storage
    persistentVolumeClaim:
      claimName: pvc-demo
